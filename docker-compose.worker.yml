# AI Container Orchestrator - Worker Node
# 이 파일을 워커 노드(베어메탈 서버)에 복사하여 사용합니다.
#
# 사용법:
#   1. .env 파일에서 ORCHESTRATOR_ROLE=worker, ORCHESTRATOR_MASTER_URL 설정
#   2. docker network create orch-internal
#   3. docker compose -f docker-compose.worker.yml up -d --build
networks:
  orch-internal:
    name: orch-internal
    external: true

services:
  orchestrator:
    build: .
    image: ai-orchestrator:latest
    container_name: ai-orchestrator-worker
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - worker-data:/data
      - /tmp/host-net-dev:/host/net/dev:ro
    environment:
      - ORCHESTRATOR_STATE_DIR=${ORCHESTRATOR_STATE_DIR:-/data}
      - ORCHESTRATOR_API_TOKEN=${ORCHESTRATOR_API_TOKEN:-}
      - ORCHESTRATOR_ROLE=worker
      - ORCHESTRATOR_NODE_NAME=${ORCHESTRATOR_NODE_NAME:-}
      - ORCHESTRATOR_MASTER_URL=${ORCHESTRATOR_MASTER_URL:-}
      - ORCHESTRATOR_HEARTBEAT_INTERVAL=${ORCHESTRATOR_HEARTBEAT_INTERVAL:-10}
      - ORCHESTRATOR_ADVERTISE_ADDR=${ORCHESTRATOR_ADVERTISE_ADDR:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - orch-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  traefik:
    image: traefik:v2.10
    container_name: orch-traefik
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=orch-internal"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - orch-internal
    restart: unless-stopped

volumes:
  worker-data:
